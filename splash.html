<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simon Loos DEX</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #CC0000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .scene {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* Logo fadet in boven de stilstaande vrachtwagen */
    .logo-wrap {
      position: absolute;
      top: -80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      animation: logofade 0.4s ease 1.1s forwards;
    }
    @keyframes logofade {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Vervang dit door je logo als je wilt: */
    /* .logo-wrap img { height: 48px; width: auto; filter: brightness(0) invert(1); } */
    .logo-placeholder {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: rgba(255,255,255,0.7);
      text-align: center;
      line-height: 1.3;
    }
    .dex-label {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Vrachtwagen rijdt van links naar rechts, stopt even */
    .truck {
      animation: truckdrive 2.0s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes truckdrive {
      0%   { transform: translateX(calc(-50vw - 200px)); }
      55%  { transform: translateX(-90px); }
      75%  { transform: translateX(-90px); }
      100% { transform: translateX(calc(60vw + 200px)); }
    }

    /* Weg */
    .road {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.2);
      margin-top: 4px;
      position: relative;
      overflow: hidden;
    }
    .road-line {
      position: absolute;
      top: 0;
      width: 50px;
      height: 2px;
      background: rgba(255,255,255,0.5);
      animation: roadline 0.5s linear infinite;
    }
    @keyframes roadline {
      from { left: -50px; }
      to   { left: 110%; }
    }

    /* Pagina fadet weg */
    body.fadeout {
      animation: fadeout 0.5s ease forwards;
    }
    @keyframes fadeout {
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="scene">

    <div class="logo-wrap">
      <!--
        MET LOGO: vervang de placeholder door:
        <img src="Simon-Loos-logo.png" alt="Simon Loos" style="height:48px;width:auto;filter:brightness(0) invert(1);">
      -->
      <img src="Simon-Loos-logo.png" alt="Simon Loos" style="height:48px;width:auto;filter:brightness(0) invert(1);">
      <div class="dex-label">DEX</div>
    </div>

    <div class="truck">
      <!--
        EIGEN VRACHTWAGEN: vervang de svg door:
        <img src="truck.png" alt="vrachtwagen" style="height:80px;width:auto;">
      -->
      <svg width="190" height="68" viewBox="0 0 190 68" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="12" width="118" height="40" rx="4" fill="white" opacity="0.95"/>
        <text x="61" y="35" font-family="DM Sans,sans-serif" font-size="8.5" font-weight="500" fill="#CC0000" text-anchor="middle" letter-spacing="0.5">SIMON LOOS</text>
        <rect x="118" y="30" width="6" height="6" rx="1" fill="white" opacity="0.6"/>
        <rect x="122" y="16" width="60" height="36" rx="5" fill="white" opacity="0.95"/>
        <rect x="152" y="20" width="24" height="18" rx="2" fill="#CC0000" opacity="0.12"/>
        <rect x="178" y="22" width="8" height="6" rx="1" fill="#FFE066"/>
        <rect x="2" y="22" width="5" height="8" rx="1" fill="#FF4444" opacity="0.7"/>
        <rect x="132" y="4" width="5" height="14" rx="2" fill="white" opacity="0.55"/>
        <circle cx="28"  cy="52" r="9" fill="#1a1a1a"/>
        <circle cx="28"  cy="52" r="4.5" fill="#3a3a3a"/>
        <circle cx="58"  cy="52" r="9" fill="#1a1a1a"/>
        <circle cx="58"  cy="52" r="4.5" fill="#3a3a3a"/>
        <circle cx="88"  cy="52" r="9" fill="#1a1a1a"/>
        <circle cx="88"  cy="52" r="4.5" fill="#3a3a3a"/>
        <circle cx="136" cy="52" r="9" fill="#1a1a1a"/>
        <circle cx="136" cy="52" r="4.5" fill="#3a3a3a"/>
        <circle cx="168" cy="52" r="9" fill="#1a1a1a"/>
        <circle cx="168" cy="52" r="4.5" fill="#3a3a3a"/>
      </svg>
    </div>

    <div class="road">
      <div class="road-line"></div>
    </div>

  </div>

  <script>
    // Na 2.8 seconden faden en doorsturen naar de DEX
    setTimeout(() => {
      document.body.classList.add("fadeout");
      setTimeout(() => {
        window.location.href = "index.html";
      }, 500);
    }, 2800);
  </script>
</body>
</html>
