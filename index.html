<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simon Loos DEX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    :root {
      --red: #CC0000;
      --bg: #f5f4f0;
      --card-bg: #ffffff;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.18);
      --text: #1a1a1a;
      --text-sub: #666;
      --text-hint: #999;
      --legendary: #BA7517;
      --legendary-bg: #FEF3DC;
      --rare: #185FA5;
      --rare-bg: #E6F1FB;
      --common: #666;
      --common-bg: #f0eeea;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    .header {
      background: var(--card-bg);
      border-bottom: 0.5px solid var(--border);
      padding: 1rem 1.25rem 0.85rem;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .logo-area {
      display: flex;
      justify-content: center;
      margin-bottom: 0.85rem;
    }

    /* Vervang de src hieronder met jouw logo-URL of relatief pad (bijv. "logo.png") */
    .logo-area img {
      height: 56px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .logo-placeholder {
      height: 56px;
      width: 56px;
      border-radius: 10px;
      border: 1.5px dashed var(--border-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--text-hint);
      text-align: center;
      line-height: 1.3;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.75rem;
    }

    .sl-bar {
      width: 4px;
      height: 24px;
      background: var(--red);
      border-radius: 2px;
      flex-shrink: 0;
    }

    .header-row h1 {
      font-size: 15px;
      font-weight: 500;
      flex: 1;
      letter-spacing: -0.01em;
    }

    .header-row p {
      font-size: 11px;
      color: var(--text-sub);
    }

    .dex-count {
      font-size: 11px;
      color: var(--text-hint);
      font-family: 'DM Mono', monospace;
    }

    .sort-bar {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sort-label {
      font-size: 11px;
      color: var(--text-hint);
      margin-right: 2px;
    }

    .sort-btn {
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 20px;
      border: 0.5px solid var(--border-strong);
      background: none;
      color: var(--text-sub);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }

    .sort-btn.active {
      background: var(--red);
      border-color: var(--red);
      color: white;
    }

    /* ─── GRID ─── */
    .grid-wrap {
      padding: 1rem 0.85rem 5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    /* ─── CARD ─── */
    .card {
      background: var(--card-bg);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .card:active { transform: scale(0.97); }

    .card-img {
      width: 100%;
      aspect-ratio: 4/3;
      background: #eae8e4;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 28px;
      position: relative;
      overflow: hidden;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-num {
      position: absolute;
      top: 7px;
      left: 8px;
      font-size: 10px;
      color: rgba(255,255,255,0.75);
      font-family: 'DM Mono', monospace;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    .pip {
      position: absolute;
      top: 7px;
      right: 8px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .pip-legendary { background: #EF9F27; }
    .pip-rare      { background: #378ADD; }
    .pip-common    { background: #aaa; }

    .spot-count {
      position: absolute;
      bottom: 7px;
      right: 8px;
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      color: rgba(255,255,255,0.9);
      background: rgba(0,0,0,0.35);
      border-radius: 20px;
      padding: 2px 7px;
    }

    .card-body {
      padding: 8px 10px 10px;
    }

    .card-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-sub {
      font-size: 11px;
      color: var(--text-sub);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-hint);
      border-top: 0.5px solid var(--border);
      padding-top: 5px;
    }

    .lbl-legendary { color: var(--legendary); font-weight: 500; }
    .lbl-rare      { color: var(--rare); font-weight: 500; }
    .lbl-common    { color: var(--common); }

    /* ─── PLACEHOLDER ─── */
    .placeholder {
      border: 0.5px dashed var(--border-strong);
      border-radius: 14px;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.3;
    }
    .placeholder span {
      font-size: 13px;
      color: var(--text-hint);
      font-family: 'DM Mono', monospace;
    }

    /* ─── OVERLAY / DETAIL ─── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }
    .overlay.open { display: flex; }

    .detail {
      background: var(--card-bg);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 480px;
      overflow: hidden;
      max-height: 92vh;
      overflow-y: auto;
    }

    .photo-reel {
      width: 100%;
      aspect-ratio: 16/9;
      background: #eae8e4;
      position: relative;
      overflow: hidden;
    }

    .reel-inner {
      display: flex;
      height: 100%;
      transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    }

    .reel-slide {
      min-width: 100%;
      height: 100%;
      flex-shrink: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 44px;
      overflow: hidden;
    }

    .reel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .reel-slide .no-photo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #bbb;
    }

    .reel-slide .no-photo span {
      font-size: 12px;
      color: var(--text-hint);
    }

    .photo-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.55));
      padding: 14px 12px 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .photo-caption span {
      font-size: 10px;
      color: rgba(255,255,255,0.88);
    }

    .reel-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.9);
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
    }
    .reel-prev { left: 8px; }
    .reel-next { right: 8px; }

    .reel-dots {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
    }
    .reel-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      transition: background 0.2s;
    }
    .reel-dot.active { background: white; }

    .detail-body {
      padding: 1rem 1.1rem 1.5rem;
    }

    .detail-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .detail-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    .detail-sub {
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 2px;
    }

    .detail-num {
      font-size: 11px;
      color: var(--text-hint);
      font-family: 'DM Mono', monospace;
      flex-shrink: 0;
      margin-left: 10px;
      margin-top: 2px;
    }

    .dtable {
      width: 100%;
      border-collapse: collapse;
    }
    .dtable td {
      font-size: 12.5px;
      padding: 5px 0;
      border-top: 0.5px solid var(--border);
      vertical-align: top;
    }
    .dtable td:first-child {
      color: var(--text-sub);
      width: 36%;
      padding-right: 10px;
    }
    .dtable td:last-child { color: var(--text); }

    .close-btn {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      border-radius: 10px;
      border: 0.5px solid var(--border-strong);
      background: none;
      font-size: 13px;
      color: var(--text-sub);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
    }
    .close-btn:hover { background: var(--bg); }
  </style>
</head>
<body>

<header class="header">
  <div class="logo-area">
    <!--
      LOGO: verander de src naar jouw logo-bestand.
      Zet je logo-afbeelding naast index.html in de repo en gebruik bijv. src="logo.png"
      Of gebruik een URL: src="https://..."
      Verwijder dan ook de logo-placeholder div hieronder.
    -->
    <div class="logo-placeholder">Logo<br>hier</div>
    <!-- <img src="logo.png" alt="Simon Loos DEX logo"> -->
  </div>
  <div class="header-row">
    <div class="sl-bar"></div>
    <div style="flex:1;">
      <h1>Simon Loos DEX</h1>
      <p>Bijzondere exemplaren</p>
    </div>
    <span class="dex-count" id="cnt"></span>
  </div>
  <div class="sort-bar">
    <span class="sort-label">Sorteren:</span>
    <button class="sort-btn active" id="btn-nieuw" onclick="setSort('nieuw')">Nieuwste eerst</button>
    <button class="sort-btn" id="btn-oud" onclick="setSort('oud')">Oudste eerst</button>
    <button class="sort-btn" id="btn-num" onclick="setSort('num')">Nummer</button>
  </div>
</header>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="detail">
    <div class="photo-reel">
      <div class="reel-inner" id="reelInner"></div>
      <div class="reel-dots" id="reelDots"></div>
      <button class="reel-nav reel-prev" id="rprev" onclick="event.stopPropagation();slide(-1)" aria-label="Vorige foto">
        <i class="ti ti-chevron-left"></i>
      </button>
      <button class="reel-nav reel-next" id="rnext" onclick="event.stopPropagation();slide(1)" aria-label="Volgende foto">
        <i class="ti ti-chevron-right"></i>
      </button>
    </div>
    <div class="detail-body">
      <div class="detail-head">
        <div>
          <div class="detail-name" id="dName"></div>
          <div class="detail-sub" id="dSub"></div>
        </div>
        <span class="detail-num" id="dNum"></span>
      </div>
      <table class="dtable" id="dtable"></table>
      <button class="close-btn" onclick="document.getElementById('overlay').classList.remove('open')">
        Sluiten
      </button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  ✏️  SPOTS — voeg hier nieuwe spots toe
//  Kopieer een heel blok van { ... }, plak het erboven,
//  pas de gegevens aan en sla op. Dat is alles.
// ============================================================

const TOTAL = 10; // Totaal aantal vakjes in de DEX (pas aan als je meer wilt)

const spots = [

  // ─── SPOT #001 ───────────────────────────────────────────
  {
    num: "#001",
    name: "Simon Loos x Bavaria",    // hoofdtitel op het kaartje
    model: "Scania R500",            // voertuigmodel (sub)
    rarity: "legendary",             // legendary / rare / common
    kenteken: "SL-001-XX",
    loc: "Lieshout, N272",
    date: "2026-05-28",              // voor sortering — formaat: JJJJ-MM-DD
    dateLabel: "28 mei 2026",        // zoals getoond op het kaartje
    spotter: "Rick van den Berg",    // wie heeft hem als eerste gespot
    opmerking: "Bavaria-branding op volledige trailer, geel/wit",
    fotos: [
      // Elke foto: wie heeft hem gemaakt en wanneer
      // Zet de beste/nieuwste foto bovenaan
      { spotter: "Rick van den Berg", date: "28 mei 2026" },
      { spotter: "Joost Smits",       date: "3 jun 2026"  },
    ]
  },

  // ─── SPOT #002 ───────────────────────────────────────────
  {
    num: "#002",
    name: "Blauwe variant",
    model: "Volvo FH 460",
    rarity: "rare",
    kenteken: "SL-208-YZ",
    loc: "Rotterdam, A15",
    date: "2026-05-22",
    dateLabel: "22 mei 2026",
    spotter: "Joost Smits",
    opmerking: "Afwijkende blauwe cabine, normaal altijd wit",
    fotos: [
      { spotter: "Joost Smits", date: "22 mei 2026" },
    ]
  },

  // ─── SPOT #003 ───────────────────────────────────────────
  {
    num: "#003",
    name: "Simon Loos X Doritos",
    model: "Mercedes",
    rarity: "rare",
    kenteken: "40-XXX-4",
    loc: "Onbekend",
    date: "2026-06-01",
    dateLabel: "1 juni 2026",
    spotter: "Melvin Arts",
    opmerking: "Simon Loos Mercedes met een prachtige pittige Doritos trailer",
    fotos: [
      { spotter: "Melvin Arts", date: "1 juni 2026", img: "fotos/SimonLoos-Doritos.jpg" }
    ]
  },

  // ─── SPOT #004 ───────────────────────────────────────────
  {
    num: "#004",
    name: "Next Gen vollak",
    model: "Scania S650",
    rarity: "legendary",
    kenteken: "SL-002-XX",
    loc: "Amsterdam, Westpoort",
    date: "2026-05-03",
    dateLabel: "3 mei 2026",
    spotter: "Femke Bos",
    opmerking: "Volledige Simon Loos-belettering op nieuwste Scania S",
    fotos: [
      { spotter: "Femke Bos",         date: "3 mei 2026"  },
      { spotter: "Rick van den Berg", date: "10 mei 2026" },
    ]
  },

  // ─── NIEUWE SPOT — kopieer dit blok en vul in ────────────
  // {
  //   num: "#005",
  //   name: "Naam van de variant",
  //   model: "Merk + model",
  //   rarity: "rare",
  //   kenteken: "SL-000-XX",
  //   loc: "Stad, weg",
  //   date: "2026-06-01",
  //   dateLabel: "1 jun 2026",
  //   spotter: "Naam spotter",
  //   opmerking: "Optionele opmerking",
  //   fotos: [
  //     { spotter: "Naam", date: "1 jun 2026" },
  //   ]
  // },

];

// ============================================================
//  Hieronder hoef je niets aan te passen
// ============================================================

const pc  = { legendary: "pip-legendary", rare: "pip-rare", common: "pip-common" };
const lc  = { legendary: "lbl-legendary", rare: "lbl-rare", common: "lbl-common" };
const lt  = { legendary: "Legendary",     rare: "Rare",     common: "Common"     };

let sortMode = "nieuw";
let activeSpot = null;
let slideIdx = 0;

function getSorted() {
  const s = [...spots];
  if (sortMode === "nieuw") return s.sort((a, b) => b.date.localeCompare(a.date));
  if (sortMode === "oud")   return s.sort((a, b) => a.date.localeCompare(b.date));
  return s.sort((a, b) => a.num.localeCompare(b.num));
}

function setSort(mode) {
  sortMode = mode;
  ["nieuw", "oud", "num"].forEach(m =>
    document.getElementById("btn-" + m).classList.toggle("active", m === mode)
  );
  render();
}

function render() {
  const g = document.getElementById("grid");
  g.innerHTML = "";
  const sorted = getSorted();

  sorted.forEach(s => {
    const c = document.createElement("div");
    c.className = "card";
    c.onclick = () => openDetail(s);
    const firstImg = s.fotos[0] && s.fotos[0].img
      ? `<img src="${s.fotos[0].img}" alt="${s.name}">`
      : `<i class="ti ti-photo"></i>`;
    c.innerHTML = `
      <div class="card-img">
        ${firstImg}
        <span class="card-num">${s.num}</span>
        <div class="pip ${pc[s.rarity]}"></div>
        <div class="spot-count">
          <i class="ti ti-camera" style="font-size:10px;"></i> ${s.fotos.length}
        </div>
      </div>
      <div class="card-body">
        <div class="card-name">${s.name}</div>
        <div class="card-sub">${s.model}</div>
        <div class="card-row">
          <span>${s.dateLabel}</span>
          <span class="${lc[s.rarity]}">${lt[s.rarity]}</span>
        </div>
      </div>`;
    g.appendChild(c);
  });

  for (let i = sorted.length; i < TOTAL; i++) {
    const p = document.createElement("div");
    p.className = "placeholder";
    p.innerHTML = `<span>${String(i + 1).padStart(3, "0")}</span>`;
    g.appendChild(p);
  }

  document.getElementById("cnt").textContent = spots.length + " / " + TOTAL;
}

function openDetail(s) {
  activeSpot = s;
  slideIdx = 0;
  document.getElementById("dName").textContent = s.name;
  document.getElementById("dSub").textContent  = s.model;
  document.getElementById("dNum").textContent  = s.num;

  const rows = [
    ["Kenteken",    s.kenteken],
    ["Eerste spot", s.dateLabel],
    ["Locatie",     s.loc],
    ["Gespot door", s.spotter],
    ["Zeldzaamheid",`<span class="${lc[s.rarity]}">${lt[s.rarity]}</span>`],
    ["Keer gespot", s.fotos.length + "x"],
  ];
  if (s.opmerking) rows.push(["Opmerking", s.opmerking]);
  document.getElementById("dtable").innerHTML =
    rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join("");

  buildReel();
  document.getElementById("overlay").classList.add("open");
  document.querySelector(".detail").scrollTop = 0;
}

function buildReel() {
  const inner = document.getElementById("reelInner");
  const dots  = document.getElementById("reelDots");
  inner.innerHTML = "";
  dots.innerHTML  = "";

  activeSpot.fotos.forEach((f, i) => {
    const slide = document.createElement("div");
    slide.className = "reel-slide";
    const imgHtml = f.img
      ? `<img src="${f.img}" alt="Foto ${i + 1}">`
      : `<div class="no-photo"><i class="ti ti-photo"></i><span>Foto volgt</span></div>`;
    slide.innerHTML = `
      ${imgHtml}
      <div class="photo-caption">
        <span><i class="ti ti-user" style="font-size:10px;margin-right:2px;"></i>${f.spotter}</span>
        <span>${f.date}</span>
      </div>`;
    inner.appendChild(slide);

    const dot = document.createElement("div");
    dot.className = "reel-dot" + (i === 0 ? " active" : "");
    dots.appendChild(dot);
  });

  const multi = activeSpot.fotos.length > 1;
  document.getElementById("rprev").style.display = multi ? "flex" : "none";
  document.getElementById("rnext").style.display = multi ? "flex" : "none";
  dots.style.display = multi ? "flex" : "none";
  updateReel();
}

function slide(dir) {
  slideIdx = (slideIdx + dir + activeSpot.fotos.length) % activeSpot.fotos.length;
  updateReel();
}

function updateReel() {
  document.getElementById("reelInner").style.transform = `translateX(-${slideIdx * 100}%)`;
  document.querySelectorAll(".reel-dot").forEach((d, i) =>
    d.classList.toggle("active", i === slideIdx)
  );
}

function closeOverlay(e) {
  if (e.target === document.getElementById("overlay"))
    document.getElementById("overlay").classList.remove("open");
}

render();
</script>
</body>
</html>
